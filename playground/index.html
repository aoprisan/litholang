<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Litho Playground</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #181825;
      --border: #313244;
      --text: #cdd6f4;
      --muted: #a6adc8;
      --accent: #89b4fa;
      --green: #a6e3a1;
      --red: #f38ba8;
      --yellow: #f9e2af;
      --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

      /* Syntax highlighting — Catppuccin Mocha */
      --syn-keyword: #cba6f7;    /* mauve */
      --syn-control: #f38ba8;    /* red */
      --syn-type: #f9e2af;       /* yellow */
      --syn-string: #a6e3a1;     /* green */
      --syn-number: #fab387;     /* peach */
      --syn-comment: #6c7086;    /* overlay0 */
      --syn-annotation: #74c7ec; /* sapphire */
      --syn-function: #89b4fa;   /* blue */
      --syn-operator: #89dceb;   /* sky */
      --syn-boolean: #fab387;    /* peach */
      --syn-builtin: #94e2d5;    /* teal */
      --syn-punctuation: #9399b2; /* overlay2 */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }

    header .actions {
      display: flex;
      gap: 8px;
    }

    button {
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    button.primary:hover { opacity: 0.9; }

    .container {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel + .panel { border-left: 1px solid var(--border); }

    .panel-header {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header .status {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }

    .panel-header .status.ok { color: var(--green); }
    .panel-header .status.error { color: var(--red); }

    /* Editor with syntax highlighting overlay */
    .editor-wrap {
      flex: 1;
      position: relative;
      overflow: auto;
      background: var(--bg);
    }

    .editor-wrap textarea,
    .editor-wrap pre {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      padding: 16px;
      margin: 0;
      border: none;
      tab-size: 2;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .editor-wrap textarea {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      resize: none;
      outline: none;
      z-index: 2;
      -webkit-text-fill-color: transparent;
    }

    .editor-wrap pre {
      position: relative;
      z-index: 1;
      min-height: 100%;
      color: var(--text);
      pointer-events: none;
    }

    .editor-wrap pre code {
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
    }

    .output {
      flex: 1;
      padding: 16px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      border: none;
      resize: none;
      outline: none;
      tab-size: 2;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output.has-error {
      color: var(--red);
    }

    /* Syntax token classes */
    .syn-kw { color: var(--syn-keyword); }
    .syn-ctrl { color: var(--syn-control); }
    .syn-type { color: var(--syn-type); }
    .syn-str { color: var(--syn-string); }
    .syn-num { color: var(--syn-number); }
    .syn-cmt { color: var(--syn-comment); font-style: italic; }
    .syn-ann { color: var(--syn-annotation); }
    .syn-fn { color: var(--syn-function); }
    .syn-op { color: var(--syn-operator); }
    .syn-bool { color: var(--syn-boolean); }
    .syn-bi { color: var(--syn-builtin); }
    .syn-punc { color: var(--syn-punctuation); }

    .examples-bar {
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .examples-bar span {
      font-size: 12px;
      color: var(--muted);
      margin-right: 4px;
    }

    .examples-bar button {
      font-size: 11px;
      padding: 3px 10px;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .panel + .panel { border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Litho Playground</h1>
    <div class="actions">
      <button onclick="formatSource()">Format</button>
      <button class="primary" onclick="compileSource()">Compile</button>
    </div>
  </header>

  <div class="examples-bar">
    <span>Examples:</span>
    <button onclick="loadExample('hello')">Hello World</button>
    <button onclick="loadExample('pipeline')">Pipeline</button>
    <button onclick="loadExample('tuples')">Tuples</button>
    <button onclick="loadExample('match')">Pattern Match</button>
    <button onclick="loadExample('error')">Error Handling</button>
    <button onclick="loadExample('tailrec')">Tail Recursion</button>
  </div>

  <div class="container">
    <div class="panel">
      <div class="panel-header">
        Litho Source
        <span class="status" id="source-status"></span>
      </div>
      <div class="editor-wrap">
        <textarea id="editor" spellcheck="false" placeholder="Write Litho code here..."></textarea>
        <pre id="editor-highlight"><code></code></pre>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        TypeScript Output
        <span class="status" id="output-status"></span>
      </div>
      <div class="output" id="output"></div>
    </div>
  </div>

  <script type="module">
    // ── Syntax highlighters ──────────────────────────────────────────

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    // Litho highlighter
    const lithoRules = [
      // Comments
      { re: /--.*$/gm, cls: "syn-cmt" },
      // Annotations
      { re: /@[a-zA-Z_][a-zA-Z0-9_]*/g, cls: "syn-ann" },
      // Strings (double-quoted, with escapes)
      { re: /"(?:[^"\\]|\\.)*"/g, cls: "syn-str" },
      // Numbers
      { re: /\b\d+(?:\.\d+)?\b/g, cls: "syn-num" },
      // Booleans
      { re: /\b(?:true|false)\b/g, cls: "syn-bool" },
      // Declaration keywords
      { re: /\b(?:define|struct|enum|type|import|from|extern|export)\b/g, cls: "syn-kw" },
      // Control keywords
      { re: /\b(?:if|then|else|for|in|do|match|on|case|return|check|end|async|await|repeat|while|try|rescue)\b/g, cls: "syn-ctrl" },
      // Operator keywords
      { re: /\b(?:and|or|not|is|as|has|with|where|each|all|self|of|by|collect)\b/g, cls: "syn-op" },
      // Built-in types
      { re: /\b(?:Text|Number|Boolean|Void|List|Map|Set|Maybe|Result|Tuple|Duration|Date|Timestamp)\b/g, cls: "syn-type" },
      // Built-in functions
      { re: /\b(?:ok|err|some|none|print|range|filter|map|sort|sum|first|last|skip|take|enumerate|zip|group|flatten|contains|length|to_text|to_number)\b/g, cls: "syn-bi" },
      // Operators
      { re: /\|>|->|=>|\?\.|==|!=|<=|>=|\.\./g, cls: "syn-op" },
    ];

    // TypeScript highlighter
    const tsRules = [
      // Comments (single-line and multi-line)
      { re: /\/\/.*$/gm, cls: "syn-cmt" },
      { re: /\/\*[\s\S]*?\*\//g, cls: "syn-cmt" },
      // Strings (single, double, backtick)
      { re: /"(?:[^"\\]|\\.)*"/g, cls: "syn-str" },
      { re: /'(?:[^'\\]|\\.)*'/g, cls: "syn-str" },
      { re: /`(?:[^`\\]|\\.)*`/g, cls: "syn-str" },
      // Numbers
      { re: /\b\d+(?:\.\d+)?\b/g, cls: "syn-num" },
      // Booleans / null / undefined
      { re: /\b(?:true|false|null|undefined)\b/g, cls: "syn-bool" },
      // Keywords
      { re: /\b(?:function|const|let|var|return|if|else|for|while|do|switch|case|break|continue|new|this|class|interface|type|enum|export|import|from|async|await|try|catch|throw|typeof|instanceof|default|extends|implements|of|in|yield|delete|void)\b/g, cls: "syn-kw" },
      // TypeScript types
      { re: /\b(?:string|number|boolean|any|never|unknown|object|bigint|symbol|readonly)\b/g, cls: "syn-type" },
      // Known runtime functions
      { re: /\b(?:console|Math|Array|Object|Promise|Map|Set|JSON)\b/g, cls: "syn-bi" },
      // Operators
      { re: /=>|===|!==|==|!=|<=|>=|\?\?|\?\./g, cls: "syn-op" },
    ];

    function highlight(source, rules) {
      // Build a list of spans: { start, end, cls }
      // Process rules in order; earlier rules win on overlap
      const spans = [];
      const taken = new Uint8Array(source.length); // 0 = free, 1 = claimed

      for (const rule of rules) {
        rule.re.lastIndex = 0;
        let m;
        while ((m = rule.re.exec(source)) !== null) {
          const start = m.index;
          const end = start + m[0].length;
          // Check no overlap with previously claimed ranges
          let overlap = false;
          for (let i = start; i < end; i++) {
            if (taken[i]) { overlap = true; break; }
          }
          if (overlap) continue;
          for (let i = start; i < end; i++) taken[i] = 1;
          spans.push({ start, end, cls: rule.cls });
        }
      }

      // Sort spans by start position
      spans.sort((a, b) => a.start - b.start);

      // Build highlighted HTML
      let html = "";
      let pos = 0;
      for (const span of spans) {
        if (span.start > pos) {
          html += escapeHtml(source.slice(pos, span.start));
        }
        html += `<span class="${span.cls}">${escapeHtml(source.slice(span.start, span.end))}</span>`;
        pos = span.end;
      }
      if (pos < source.length) {
        html += escapeHtml(source.slice(pos));
      }

      // Ensure trailing newline so the pre height matches the textarea
      if (!html.endsWith("\n")) html += "\n";

      return html;
    }

    function highlightLitho(source) {
      return highlight(source, lithoRules);
    }

    function highlightTypeScript(source) {
      return highlight(source, tsRules);
    }

    // ── Editor sync ──────────────────────────────────────────────────

    const editorEl = document.getElementById("editor");
    const highlightEl = document.querySelector("#editor-highlight code");

    function syncHighlight() {
      highlightEl.innerHTML = highlightLitho(editorEl.value);
    }

    editorEl.addEventListener("input", syncHighlight);
    editorEl.addEventListener("scroll", () => {
      const pre = document.getElementById("editor-highlight");
      pre.scrollTop = editorEl.scrollTop;
      pre.scrollLeft = editorEl.scrollLeft;
    });

    // ── Compiler ─────────────────────────────────────────────────────

    let Lexer, Parser, TypeChecker, TypeScriptEmitter, Formatter, formatDiagnostics;

    async function loadCompiler() {
      try {
        const base = location.pathname.includes("/playground/") ? "../dist" : "./dist";
        const mod = await import(`${base}/index.js`);
        Lexer = mod.Lexer;
        Parser = mod.Parser;
        TypeChecker = mod.TypeChecker;
        TypeScriptEmitter = mod.TypeScriptEmitter;
        Formatter = mod.Formatter;
        formatDiagnostics = mod.formatDiagnostics;
        document.getElementById("source-status").textContent = "compiler loaded";
        document.getElementById("source-status").className = "status ok";
      } catch (e) {
        document.getElementById("source-status").textContent = "compiler not loaded - serve from repo root";
        document.getElementById("source-status").className = "status error";
        console.error("Failed to load compiler:", e);
      }
    }

    function compile(source) {
      const lexer = new Lexer(source);
      const tokens = lexer.tokenize();
      const parser = new Parser(tokens);
      const ast = parser.parse();

      const checker = new TypeChecker();
      const typeErrors = checker.check(ast);

      if (typeErrors.length > 0) {
        return {
          ok: false,
          error: formatDiagnostics(source, "playground.litho", typeErrors),
        };
      }

      const emitter = new TypeScriptEmitter();
      return { ok: true, output: emitter.emit(ast) };
    }

    function format(source) {
      const lexer = new Lexer(source);
      const tokens = lexer.tokenize();
      const parser = new Parser(tokens);
      const ast = parser.parse();
      const formatter = new Formatter();
      return formatter.format(ast);
    }

    window.compileSource = function () {
      const source = editorEl.value;
      const outputEl = document.getElementById("output");
      const statusEl = document.getElementById("output-status");

      if (!Lexer) {
        outputEl.textContent = "Compiler not loaded. Serve the playground from the repo root:\n\n  npx serve .";
        outputEl.className = "output has-error";
        return;
      }

      try {
        const result = compile(source);
        if (result.ok) {
          outputEl.innerHTML = highlightTypeScript(result.output);
          outputEl.className = "output";
          statusEl.textContent = "compiled";
          statusEl.className = "status ok";
        } else {
          outputEl.textContent = result.error;
          outputEl.className = "output has-error";
          statusEl.textContent = "type errors";
          statusEl.className = "status error";
        }
      } catch (e) {
        outputEl.textContent = e.message;
        outputEl.className = "output has-error";
        statusEl.textContent = "parse error";
        statusEl.className = "status error";
      }
    };

    window.formatSource = function () {
      if (!Lexer) return;
      try {
        editorEl.value = format(editorEl.value);
        syncHighlight();
        document.getElementById("source-status").textContent = "formatted";
        document.getElementById("source-status").className = "status ok";
      } catch (e) {
        document.getElementById("source-status").textContent = "format error";
        document.getElementById("source-status").className = "status error";
      }
    };

    const examples = {
      hello: `@purpose "A simple greeting"

define greet(name: Text) -> Text as
  return "Hello, " + name + "!"
end

define main() -> Void as
  message = greet("world")
  print(message)
end`,

      pipeline: `struct Sale has
  category: Text
  amount: Number
  active: Boolean
end

define total_active_revenue(sales: List<Sale>) -> Number as
  return sales
    |> filter(where .active == true)
    |> sort(by .amount, descending)
    |> sum(of .amount)
end`,

      tuples: `define min_max(items: List<Number>) -> Tuple<Number, Number> as
  sorted = items |> sort()
  lo = sorted |> first
  hi = sorted |> last
  return (lo, hi)
end

define format_range(bounds: Tuple<Number, Number>) -> Text as
  match bounds on
    case (lo, hi) where lo == hi => return "exactly " + to_text(lo)
    case (lo, hi) => return to_text(lo) + " to " + to_text(hi)
  end
end

define divide(a: Number, b: Number) -> Result<Tuple<Number, Number>, Text> as
  check b != 0 or return err("division by zero")
  return ok((a / b, a % b))
end`,

      match: `enum Shape is
  Circle(radius: Number)
  Rectangle(width: Number, height: Number)
  Point
end

define area(s: Shape) -> Number as
  match s on
    case Circle(r) => r * r * 3.14159
    case Rectangle(dims) => dims
    case Point => 0
  end
end

enum OrderStatus is
  Pending
  Paid
  Shipped
end

define transition(status: OrderStatus, action: Text) -> Result<OrderStatus, Text> as
  match (status, action) on
    case (Pending, "pay") => return ok(Paid)
    case (Paid, "ship") => return ok(Shipped)
    case (_, _) => return err("invalid transition")
  end
end`,

      error: `struct User has
  email: Text
  age: Number
end

define validate_user(email: Text, age: Number) -> Result<User, Text> as
  check email != "" or return err("Email is required")
  check age >= 0 or return err("Age must be non-negative")
  check age < 150 or return err("Age seems unrealistic")

  return ok(User(email: email, age: age))
end

define register(email: Text, age: Number) -> Result<Text, Text> as
  user = validate_user(email, age)?
  return ok("Registered " + user.email)
end`,

      tailrec: `@tailrec
define factorial(n: Number, acc: Number) -> Number as
  if n <= 1 then
    return acc
  else
    return factorial(n - 1, n * acc)
  end
end

@tailrec
define sum_list(items: List<Number>, acc: Number) -> Number as
  check items.length > 0 or return acc
  head = items |> first
  tail = items |> skip(1)
  return sum_list(tail, acc + head)
end`,
    };

    window.loadExample = function (name) {
      editorEl.value = examples[name] || "";
      syncHighlight();
      document.getElementById("output").textContent = "";
      document.getElementById("output").className = "output";
      document.getElementById("output-status").textContent = "";
      document.getElementById("source-status").textContent = "";
    };

    // Auto-compile on Ctrl/Cmd+Enter
    editorEl.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        window.compileSource();
      }
      // Tab inserts 2 spaces
      if (e.key === "Tab") {
        e.preventDefault();
        const ta = e.target;
        const start = ta.selectionStart;
        ta.value = ta.value.substring(0, start) + "  " + ta.value.substring(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = start + 2;
        syncHighlight();
      }
    });

    // Load compiler and default example
    await loadCompiler();
    window.loadExample("hello");
  </script>
</body>
</html>
